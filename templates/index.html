<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard OEE & Downtime</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo {
            height: 55px;
            width: auto;
            max-height: 55px;
            object-fit: contain;
        }

        .header-title h1 {
            color: #333;
            font-size: 24px;
            margin: 0;
        }

        .header-title h1 span {
            color: #667eea;
        }

        .header-title small {
            font-size: 12px;
            color: #999;
            display: block;
        }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            background: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        .tab-btn.active { background: #667eea; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .upload-area {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
            border: 2px dashed #ddd;
            cursor: pointer;
        }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-icon { font-size: 48px; margin-bottom: 15px; }
        .upload-area input { display: none; }
        .upload-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .stat-value { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .stat-label { color: #666; font-size: 12px; text-transform: uppercase; }
        .stat-sub { font-size: 11px; color: #999; margin-top: 5px; }
        
        .graph-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(550px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .graph-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .graph-card h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            overflow-x: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .table-container h3 {
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
            font-size: 16px;
        }
        .oee-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .oee-table thead tr { background: #667eea; }
        .oee-table thead th {
            color: white;
            padding: 13px 18px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
        }
        .oee-table thead th:first-child { text-align: left; }
        .oee-table tbody tr { border-bottom: 1px solid #eef0f8; }
        .oee-table tbody tr:nth-child(even) { background: #f8f9ff; }
        .oee-table tbody tr:nth-child(odd) { background: #ffffff; }
        .oee-table tbody tr:hover { background: #eef0ff !important; }
        .oee-table tbody td { padding: 11px 18px; text-align: center; }
        .oee-table tbody td:first-child { text-align: left; font-weight: 700; color: #2d3748; }
        .val-red { color: #e53e3e; font-weight: 600; }
        .val-orange { color: #dd6b20; font-weight: 600; }
        .val-green { color: #38a169; font-weight: 600; }
        .val-neutral { color: #4a5568; font-weight: 500; }
        
        .export-buttons { display: flex; gap: 15px; margin-top: 20px; justify-content: flex-end; }
        .export-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .export-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .export-btn.excel { background: #e53e3e; }
        
        .message {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .message.success { background: #d4edda; border-color: #28a745; color: #155724; }
        .message.error { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        
        @media (max-width: 768px) {
            .graph-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header-logo { height: 40px; }
            .header-title h1 { font-size: 18px; }
            .header-left { gap: 10px; }
            .export-buttons { justify-content: center; margin-top: 15px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <img src="{{ url_for('static', filename='SEBN-TN.png') }}" alt="SEBN-TN" class="header-logo" onerror="this.style.display='none'">
            <div class="header-title">
                <h1>Dashboard <span>OEE & Downtime</span></h1>
                <small>C&C Area</small>
            </div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('oee')">📊 OEE</button>
        <button class="tab-btn" onclick="switchTab('downtime')">⏱️ Downtime</button>
    </div>

    <!-- ==================== TAB OEE ==================== -->
    <div id="tab-oee" class="tab-content active">
        <div class="upload-area">
            <div class="upload-icon">📂</div>
            <h3>Téléchargez votre fichier OEE</h3>
            <input type="file" id="fileInputOEE" accept=".xlsx,.xls,.csv">
            <button class="upload-btn" onclick="document.getElementById('fileInputOEE').click()">Choisir un fichier</button>
        </div>
        <div id="oeeContent" style="display:none;">
            <div class="stats-grid" id="oeeStats"></div>
            <div class="graph-grid">
                <div class="graph-card"><h3>🎯 OEE Global</h3><div id="gaugeChart"></div></div>
                <div class="graph-card"><h3>📊 Moyennes</h3><div id="averagesChart"></div></div>
                <div class="graph-card"><h3>🏆 Top 10</h3><div id="top10Chart"></div></div>
                <div class="graph-card"><h3>⚠️ Bottom 10</h3><div id="bottom10Chart"></div></div>
                <div class="graph-card"><h3>⚡ Top Performance</h3><div id="performanceChart"></div></div>
                <div class="graph-card"><h3>📊 Classement complet</h3><div id="allOeeChart"></div></div>
            </div>
            <div class="table-container">
                <h3>📋 Détail complet par machine</h3>
                <div id="oeeTable"></div>
            </div>
            <div class="export-buttons">
                <button class="export-btn" onclick="exportOEEData('csv')">📥 Export CSV</button>
                <button class="export-btn excel" onclick="exportOEEData('excel')">📊 Export Excel</button>
            </div>
        </div>
    </div>

    <!-- ==================== TAB DOWNTIME ==================== -->
    <div id="tab-downtime" class="tab-content">
        <div class="upload-area">
            <div class="upload-icon">⏱️</div>
            <h3>Téléchargez votre fichier Downtime</h3>
            <input type="file" id="fileInputDowntime" accept=".xlsx,.xls,.csv">
            <button class="upload-btn" onclick="document.getElementById('fileInputDowntime').click()">Choisir un fichier</button>
        </div>
        <div id="downtimeContent" style="display:none;">
            <div class="stats-grid" id="downtimeStats"></div>
            <div class="graph-grid">
                <div class="graph-card"><h3>🥧 Catégories d'arrêt</h3><div id="categoriesPieChart"></div></div>
                <div class="graph-card"><h3>📊 Toutes les causes d'arrêt</h3><div id="causesBarChart"></div></div>
            </div>
            <div class="export-buttons">
                <button class="export-btn" onclick="exportDowntimeData('csv')">📥 Export CSV</button>
                <button class="export-btn excel" onclick="exportDowntimeData('excel')">📊 Export Excel</button>
            </div>
        </div>
    </div>
</div>

<script>
    let currentOeeData = null;
    let currentDowntimeData = null;

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        if (tab === 'oee') {
            document.querySelector('.tab-btn:first-child').classList.add('active');
            document.getElementById('tab-oee').classList.add('active');
        } else {
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('tab-downtime').classList.add('active');
        }
    }

    document.getElementById('fileInputOEE').addEventListener('change', e => { if (e.target.files[0]) handleOEEFile(e.target.files[0]); });
    document.getElementById('fileInputDowntime').addEventListener('change', e => { if (e.target.files[0]) handleDowntimeFile(e.target.files[0]); });

    async function handleOEEFile(file) {
        const fd = new FormData(); fd.append('file', file);
        showMessage('Traitement du fichier OEE...', 'info');
        try {
            const res = await fetch('/upload/oee', { method: 'POST', body: fd });
            const r = await res.json();
            if (r.success) { 
                currentOeeData = r; 
                updateOEEDashboard(r); 
                showMessage('✅ Fichier OEE chargé ! ' + r.machines_count + ' machines', 'success'); 
            }
            else showMessage('❌ Erreur : ' + r.error, 'error');
        } catch(e) { showMessage('❌ Erreur : ' + e.message, 'error'); }
    }

    async function handleDowntimeFile(file) {
        const fd = new FormData(); fd.append('file', file);
        showMessage('Traitement du fichier Downtime...', 'info');
        try {
            const res = await fetch('/upload/downtime', { method: 'POST', body: fd });
            const r = await res.json();
            if (r.success) { 
                currentDowntimeData = r; 
                updateDowntimeDashboard(r); 
                showMessage('✅ Fichier Downtime chargé !', 'success'); 
            }
            else showMessage('❌ Erreur : ' + r.error, 'error');
        } catch(e) { showMessage('❌ Erreur : ' + e.message, 'error'); }
    }

    function colorClass(v) { return v < 55 ? 'val-red' : (v < 75 ? 'val-orange' : 'val-green'); }
    function safeValue(v) { return (v !== undefined && v !== null && !isNaN(v)) ? v.toFixed(2) : '0.00'; }

    function updateOEEDashboard(data) {
        const m = data.metrics;
        document.getElementById('oeeStats').innerHTML = `
            <div class="stat-card"><div class="stat-label">MACHINES</div><div class="stat-value">${m.total_machines}</div></div>
            <div class="stat-card"><div class="stat-label">OEE MOYEN</div><div class="stat-value ${colorClass(m.avg_oee)}">${safeValue(m.avg_oee)}%</div></div>
            <div class="stat-card"><div class="stat-label">PERFORMANCE</div><div class="stat-value">${safeValue(m.avg_performance)}%</div></div>
            <div class="stat-card"><div class="stat-label">AVAILABILITY</div><div class="stat-value">${safeValue(m.avg_availability)}%</div></div>
            <div class="stat-card"><div class="stat-label">QUALITY</div><div class="stat-value">${safeValue(m.avg_quality)}%</div></div>
            <div class="stat-card"><div class="stat-label">LOADING</div><div class="stat-value">${safeValue(m.avg_loading)}%</div></div>
            <div class="stat-card"><div class="stat-label">🏆 BEST</div><div class="stat-value" style="font-size:18px;">${m.best_machine}</div><div class="stat-sub">OEE: ${safeValue(m.best_oee)}%</div></div>
            <div class="stat-card"><div class="stat-label">⚠️ WORST</div><div class="stat-value" style="font-size:18px;">${m.worst_machine}</div><div class="stat-sub">OEE: ${safeValue(m.worst_oee)}%</div></div>
            <div class="stat-card"><div class="stat-label">📊 OEE MAX</div><div class="stat-value val-green">${safeValue(m.max_oee)}%</div><div class="stat-sub">${m.max_oee_machine}</div></div>
        `;

        if (data.graphs) {
            if (data.graphs.gauge) Plotly.newPlot('gaugeChart', data.graphs.gauge.data, data.graphs.gauge.layout);
            if (data.graphs.averages) Plotly.newPlot('averagesChart', data.graphs.averages.data, data.graphs.averages.layout);
            if (data.graphs.top10) Plotly.newPlot('top10Chart', data.graphs.top10.data, data.graphs.top10.layout);
            if (data.graphs.bottom10) Plotly.newPlot('bottom10Chart', data.graphs.bottom10.data, data.graphs.bottom10.layout);
            if (data.graphs.performance_chart) Plotly.newPlot('performanceChart', data.graphs.performance_chart.data, data.graphs.performance_chart.layout);
            if (data.graphs.all_oee) Plotly.newPlot('allOeeChart', data.graphs.all_oee.data, data.graphs.all_oee.layout);
        }

        let rows = '';
        for (const d of data.machines_data) {
            rows += `<tr>
                <td><strong>${d.Machine}</strong></td>
                <td class="${colorClass(d.OEE)}">${safeValue(d.OEE)}%</td
                ><td class="${colorClass(d.Availability)}">${safeValue(d.Availability)}%</td
                ><td class="${colorClass(d.Performance)}">${safeValue(d.Performance)}%</td
                ><td class="${colorClass(d.Quality)}">${safeValue(d.Quality)}%</td
                ><td class="val-neutral">${safeValue(d.Loading)}%</td
            </tr>`;
        }
        document.getElementById('oeeTable').innerHTML = `
            <table class="oee-table">
                <thead><tr>
                    <th>Machine</th><th>OEE (%)</th><th>Availability (%)</th>
                    <th>Performance (%)</th><th>Quality (%)</th><th>Loading (%)</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
        document.getElementById('oeeContent').style.display = 'block';
    }

    function updateDowntimeDashboard(data) {
        const dt = data.downtime_data;
        let html = `
            <div class="stat-card"><div class="stat-label">TOTAL CATEGORIES</div><div class="stat-value">${Math.round(dt.total_categories||0)} min</div></div>
            <div class="stat-card"><div class="stat-label">TOTAL CAUSES</div><div class="stat-value">${Math.round(dt.total_causes||0)} min</div></div>`;
        if (dt.categories) {
            for (const [k,v] of Object.entries(dt.categories)) {
                html += `<div class="stat-card"><div class="stat-label">${k}</div><div class="stat-value" style="font-size:20px;">${Math.round(v)} min</div></div>`;
            }
        }
        document.getElementById('downtimeStats').innerHTML = html;
        if (data.graphs) {
            if (data.graphs.categories_pie) Plotly.newPlot('categoriesPieChart', data.graphs.categories_pie.data, data.graphs.categories_pie.layout);
            if (data.graphs.causes_bar) Plotly.newPlot('causesBarChart', data.graphs.causes_bar.data, data.graphs.causes_bar.layout);
        }
        document.getElementById('downtimeContent').style.display = 'block';
    }

    // Export pour OEE
    async function exportOEEData(format) {
        if (!currentOeeData || !currentOeeData.machines_data) {
            showMessage('Aucune donnée OEE à exporter', 'error');
            return;
        }
        const endpoint = format === 'csv' ? '/export/oee/csv' : '/export/oee/excel';
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: currentOeeData.machines_data})
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `oee_export_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.${format === 'csv' ? 'csv' : 'xlsx'}`;
        a.click();
        window.URL.revokeObjectURL(url);
        showMessage('✅ Export OEE réussi !', 'success');
    }

    // Export pour Downtime
    async function exportDowntimeData(format) {
        if (!currentDowntimeData || !currentDowntimeData.downtime_data) {
            showMessage('Aucune donnée Downtime à exporter', 'error');
            return;
        }
        
        let dataToExport = [];
        const dt = currentDowntimeData.downtime_data;
        
        if (format === 'csv') {
            // Exporter les catégories
            if (dt.categories) {
                for (const [key, value] of Object.entries(dt.categories)) {
                    dataToExport.push({Type: key, Durée_minutes: value});
                }
            }
            // Ajouter les causes
            if (dt.causes) {
                for (const cause of dt.causes) {
                    dataToExport.push({Type: 'Cause', Cause: cause.cause, Durée_minutes: cause.duration});
                }
            }
        } else {
            dataToExport = dt;
        }
        
        const endpoint = format === 'csv' ? '/export/downtime/csv' : '/export/downtime/excel';
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: dataToExport})
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `downtime_export_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.${format === 'csv' ? 'csv' : 'xlsx'}`;
        a.click();
        window.URL.revokeObjectURL(url);
        showMessage('✅ Export Downtime réussi !', 'success');
    }

    function showMessage(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message ' + type;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 4000);
    }
</script>
</body>
</html>
